<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Live Traffic Dashboard</title>

    <link rel="stylesheet" href="live.css">

</head>
<body>

    <main class="dashboard-shell">

        <header class="topbar">
            <div>
                <p class="eyebrow">Live Signal Control</p>
                <h1>Smart Traffic Dashboard</h1>
            </div>
            <a class="back-link" href="index.html">New Detection</a>
        </header>

        <section class="dashboard">

            <div class="lane-card waiting" id="lane1Card">

                <div class="lane-top">
                    <h2>Lane 1</h2>
                    <span class="status" id="lane1Status">WAITING</span>
                </div>

                <img id="lane1Img" alt="Lane 1 Detection">

                <div class="lane-bottom">
                    <div class="info">
                        <p id="lane1Total"></p>
                        <p id="lane1Cars"></p>
                        <p id="lane1Bus"></p>
                        <p id="lane1Truck"></p>
                        <p id="lane1Bike"></p>
                        <p id="lane1Auto"></p>
                        <p id="lane1Bicycle"></p>
                    </div>

                    <div class="timer" id="lane1Timer">0s</div>
                </div>

            </div>

            <div class="lane-card waiting" id="lane2Card">

                <div class="lane-top">
                    <h2>Lane 2</h2>
                    <span class="status" id="lane2Status">WAITING</span>
                </div>

                <img id="lane2Img" alt="Lane 2 Detection">

                <div class="lane-bottom">
                    <div class="info">
                        <p id="lane2Total"></p>
                        <p id="lane2Cars"></p>
                        <p id="lane2Bus"></p>
                        <p id="lane2Truck"></p>
                        <p id="lane2Bike"></p>
                        <p id="lane2Auto"></p>
                        <p id="lane2Bicycle"></p>
                    </div>

                    <div class="timer" id="lane2Timer">0s</div>
                </div>

            </div>

            <div class="lane-card waiting" id="lane3Card">

                <div class="lane-top">
                    <h2>Lane 3</h2>
                    <span class="status" id="lane3Status">WAITING</span>
                </div>

                <img id="lane3Img" alt="Lane 3 Detection">

                <div class="lane-bottom">
                    <div class="info">
                        <p id="lane3Total"></p>
                        <p id="lane3Cars"></p>
                        <p id="lane3Bus"></p>
                        <p id="lane3Truck"></p>
                        <p id="lane3Bike"></p>
                        <p id="lane3Auto"></p>
                        <p id="lane3Bicycle"></p>
                    </div>

                    <div class="timer" id="lane3Timer">0s</div>
                </div>

            </div>

            <div class="lane-card waiting" id="lane4Card">

                <div class="lane-top">
                    <h2>Lane 4</h2>
                    <span class="status" id="lane4Status">WAITING</span>
                </div>

                <img id="lane4Img" alt="Lane 4 Detection">

                <div class="lane-bottom">
                    <div class="info">
                        <p id="lane4Total"></p>
                        <p id="lane4Cars"></p>
                        <p id="lane4Bus"></p>
                        <p id="lane4Truck"></p>
                        <p id="lane4Bike"></p>
                        <p id="lane4Auto"></p>
                        <p id="lane4Bicycle"></p>
                    </div>

                    <div class="timer" id="lane4Timer">0s</div>
                </div>

            </div>

        </section>

    </main>

    <script src="live.js"></script>

</body>
</html>
