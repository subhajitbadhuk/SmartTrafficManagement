<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Traffic Dashboard</title>

<link rel="stylesheet" href="live.css">

</head>
<body>

<h1>Live Dashboard</h1>


<div class="dashboard">

    <div class="lane-card" id="lane1Card">

        <h2>Lane 1</h2>

        <img id="lane1Img">

        <div class="info">

            <p id="lane1Total"></p>

            <p id="lane1Cars"></p>

            <p id="lane1Bus"></p>

            <p id="lane1Truck"></p>

            <p id="lane1Bike"></p>

        </div>

        <div class="status" id="lane1Status">
            WAITING
        </div>

        <div class="timer" id="lane1Timer">
            0
        </div>

    </div>

    <div class="lane-card" id="lane2Card">

        <h2>Lane 2</h2>

        <img id="lane2Img">

        <div class="info">

            <p id="lane2Total"></p>

            <p id="lane2Cars"></p>

            <p id="lane2Bus"></p>

            <p id="lane2Truck"></p>

            <p id="lane2Bike"></p>

        </div>

        <div class="status" id="lane2Status">
            WAITING
        </div>

        <div class="timer" id="lane2Timer">
            0
        </div>

    </div>

    <div class="lane-card" id="lane3Card">

        <h2>Lane 3</h2>

        <img id="lane3Img">

        <div class="info">

            <p id="lane3Total"></p>

            <p id="lane3Cars"></p>

            <p id="lane3Bus"></p>

            <p id="lane3Truck"></p>

            <p id="lane3Bike"></p>

        </div>

        <div class="status" id="lane3Status">
            WAITING
        </div>

        <div class="timer" id="lane3Timer">
            0
        </div>

    </div>

    <div class="lane-card" id="lane4Card">

        <h2>Lane 4</h2>

        <img id="lane4Img">

        <div class="info">

            <p id="lane4Total"></p>

            <p id="lane4Cars"></p>

            <p id="lane4Bus"></p>

            <p id="lane4Truck"></p>

            <p id="lane4Bike"></p>

        </div>

        <div class="status" id="lane4Status">
            WAITING
        </div>

        <div class="timer" id="lane4Timer">
            0
        </div>

    </div>

</div>

<script src="live.js"></script>

</body>
</html>
